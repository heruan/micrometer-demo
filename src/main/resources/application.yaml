spring:
  application:
    name: micrometer-demo

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  observations:
    annotations:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
  otlp:
    metrics:
      export:
        enabled: false
  metrics:
    distribution:
      percentiles-histogram:
        person.fetch: true
        person.count: true
      slo:
        person.fetch: 10ms, 50ms, 100ms, 500ms
        person.count: 10ms, 50ms, 100ms, 500ms
