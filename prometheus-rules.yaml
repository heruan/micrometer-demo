groups:
  - name: person-service
    interval: 15s
    rules:
      - alert: PersonFetchP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(person_fetch_seconds_bucket[2m]))) > 0.1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "p95 fetch latency above 100 ms"
          description: "Person fetch p95 is {{ $value | humanizeDuration }} — investigate slow paths."

      - alert: PersonFetchP99High
        expr: histogram_quantile(0.99, sum by (le) (rate(person_fetch_seconds_bucket[2m]))) > 0.5
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "p99 fetch latency above 500 ms"
          description: "Person fetch p99 is {{ $value | humanizeDuration }} — tail latency is degraded."

      - alert: PersonServiceIdle
        expr: rate(person_fetch_seconds_count[1m]) == 0
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "No person fetches in 1 minute"
          description: "Service may be idle or the scrape target is broken."
